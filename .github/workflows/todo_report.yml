name: エリカのToDo自動タスク生成 (ToDo)

# 実行されるタイミングの設定
on:
  schedule:
    # 毎日日本時間の8:00（UTCの23:00）に自動実行
    - cron: '0 23 * * *'
  workflow_dispatch:
    # GitHubの画面から手動で実行するためのボタン

permissions:
  contents: write

jobs:
  generate-todo-report:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. リポジトリのコードを読み込む
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Pythonの環境を準備する
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 必要なライブラリをインストールする
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
          python -m pip install --upgrade pip
          pip install openai feedparser requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client google-genai tavily-python

      # 4. エリカにToDo観測日誌を書かせる（--mode todo を指定）
      - name: Run report generation script (ToDo Mode)
        env:
          SAKURA_API_KEY: ${{ secrets.SAKURA_API_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }} 
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }} 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TASKS_TOKEN: ${{ secrets.TASKS_TOKEN }}
        run: python report_gen.py --mode todo

      # 5. 生成されたファイル（MarkdownやJSON）をGitHubに自動保存
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "エリカが本日のToDo観測日誌と音声を自動生成しました" && git push)
