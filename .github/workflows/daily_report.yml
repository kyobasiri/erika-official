name: エリカの自動日報生成

# 実行されるタイミングの設定
on:
  schedule:
    # 毎日日本時間の朝7:00（UTCの22:00）に自動実行
    - cron: '0 22 * * *'
  workflow_dispatch:
    # GitHubの画面から手動で実行するためのボタンも有効化

# ▼▼▼ この2行を追加 ▼▼▼
permissions:
  contents: write
# ▲▲▲ 追加ここまで ▲▲▲

jobs:
  generate-report:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. リポジトリのコードを読み込む
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Pythonの環境を準備する
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 安定しているバージョンを指定

      # 3. 必要なライブラリをインストールする
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk  # ←この1行を一番上に追加
          python -m pip install --upgrade pip
          pip install openai feedparser requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client google-genai tavily-python

      # 4. エリカに日報を書かせる（Pythonスクリプトの実行）
      - name: Run report generation script
        env:
          SAKURA_API_KEY: ${{ secrets.SAKURA_API_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }} 
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }} 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python report_gen.py --mode private

     # 5. 生成されたファイル（MarkdownとJSON、そして音声）をGitHubに自動保存
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 生成・更新されたファイルを指定（assets/audio/ を追加）
          git add reports/ assets/reports.json assets/audio/ 

          git diff --quiet && git diff --staged --quiet || (git commit -m "エリカが本日の日報と音声を自動生成しました 📝🎧" && git push)