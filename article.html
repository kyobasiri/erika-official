<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>記事ページ | エリカ・プロジェクト</title>
    <link rel="stylesheet" href="./css/lib/bulma.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="assets/images/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/icon.png">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Erika Official | AI Art & Music">
    <meta property="og:description" content="AI Artist & Album Reviewer ERIKA. エリカが好き勝手に語るチャンネルの公式サイト">
    <meta property="og:url" content="https://erika.erikakataru.com/">
    <meta property="og:image" content="https://erika.erikakataru.com/assets/images/ogp.jpg">
    <meta property="og:site_name" content="Erika Project">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@erikakataru">
    <meta name="twitter:title" content="Erika Official | AI Art & Music">
    <meta name="twitter:description" content="AI Artist & Album Reviewer ERIKA. エリカが好き勝手に語るチャンネルの公式サイト">
    <meta name="twitter:image" content="https://erika.erikakataru.com/assets/images/ogp.jpg">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9959522790700122"
        crossorigin="anonymous"></script>
    <script src="./js/lib/marked.min.js"></script>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</head>

<body>
    <div id="app" class="container section">
        <div class="content">

            <div v-html="compiledMarkdown"></div>

            <hr v-if="compiledMarkdown !== '<p>読み込み中...</p>'">

            <div class="columns is-multiline">
                <div class="column is-half" v-for="n in 10" :key="n" v-show="!imageErrors[n]">
                    <figure class="image">
                        <img :src="`/assets/images/gallery/${articleId}/${n}.png`" @error="handleImageError(n)"
                            alt="エリカ・ギャラリー画像">
                    </figure>
                </div>
            </div>

            <div v-if="hasGallery" class="has-text-centered" style="margin-top: 2rem;">
                <a :href="`./gallery.html?folder=${articleId}`" class="button is-warning is-rounded is-medium" style="box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                    <strong>📸 すべての画像を見る（ギャラリーへ）</strong>
                </a>
            </div>

            <hr style="margin-top: 3rem; margin-bottom: 3rem; background-color: #333;">

            <nav class="pagination is-centered" role="navigation" aria-label="pagination">
                <a v-if="prevArticle" :href="`./article.html?id=${prevArticle.id}`" class="pagination-previous has-background-dark has-text-white" style="border-color: #555;">
                    &laquo; 前の記事
                </a>
                <a v-else class="pagination-previous is-disabled has-background-dark has-text-grey" style="border-color: #555;" disabled>
                    &laquo; 前の記事
                </a>

                <ul class="pagination-list">
                    <li>
                        <a href="/blog.html" class="button is-link is-outlined">
                            <strong>記事一覧に戻る</strong>
                        </a>
                    </li>
                </ul>

                <a v-if="nextArticle" :href="`./article.html?id=${nextArticle.id}`" class="pagination-next has-background-dark has-text-white" style="border-color: #555;">
                    次の記事 &raquo;
                </a>
                <a v-else class="pagination-next is-disabled has-background-dark has-text-grey" style="border-color: #555;" disabled>
                    次の記事 &raquo;
                </a>
            </nav>

        </div>
    </div>

    <script type="module">
        // ローカルのVueを読み込む
        import { createApp, ref, onMounted, nextTick } from './js/lib/vue.esm-browser.js';

        createApp({
            setup() {
                const articleId = ref('');
                const compiledMarkdown = ref('<p>読み込み中...</p>');
                const imageErrors = ref({});
                const hasGallery = ref(false);
                const prevArticle = ref(null);
                const nextArticle = ref(null);

                const handleImageError = (n) => {
                    imageErrors.value[n] = true;
                };

                onMounted(async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id') || '001-test';
                    articleId.value = id;

                    // ギャラリーの存在チェック
                    try {
                        const galleryRes = await fetch(`assets/gallery.json?t=${new Date().getTime()}`);
                        if (galleryRes.ok) {
                            let galleryData = await galleryRes.json();
                            if (!Array.isArray(galleryData)) {
                                galleryData = Object.keys(galleryData).map(key => ({ name: key }));
                            }
                            hasGallery.value = galleryData.some(folder => folder.name === id);
                        }
                    } catch (e) {
                        console.error("Gallery list could not be fetched", e);
                    }

                    // 前/次の記事を取得
                    try {
                        const articlesRes = await fetch(`assets/articles.json?t=${new Date().getTime()}`);
                        if (articlesRes.ok) {
                            const articles = await articlesRes.json();
                            const currentIndex = articles.findIndex(a => a.id === id);
                            if (currentIndex !== -1) {
                                // articles配列は新しい記事が先頭()なので、前の記事＝次のインデックス、次の記事＝前のインデックス
                                if (currentIndex < articles.length - 1) {
                                    prevArticle.value = articles[currentIndex + 1];
                                }
                                if (currentIndex > 0) {
                                    nextArticle.value = articles[currentIndex - 1];
                                }
                            }
                        }
                    } catch (e) {
                        console.error("Articles list could not be fetched", e);
                    }

                    try {
                        const response = await fetch(`./articles/${id}.md`);
                        if (!response.ok) throw new Error('記事が見つかりません');
                        let text = await response.text();

                        // ★追加：Windowsの改行コード(\r)を完全に削除し、誤作動を防ぐ
                        text = text.replace(/\r/g, '');

                        // ① X(Twitter)の自動埋め込み
                        // 「行の先頭からURLだけで構成されている場合」のみ変換
                        const xLinkRegex = /^[ \t]*https?:\/\/(?:x\.com|twitter\.com)\/([a-zA-Z0-9_]+\/status\/\d+)[^\s<]*[ \t]*$/gm;
                        text = text.replace(xLinkRegex, '\n\n<div style="display: flex; justify-content: center;"><blockquote class="twitter-tweet" data-align="center"><a href="https://twitter.com/$1"></a></blockquote></div>\n\n');

                        // ② YouTube【ショート動画】の自動埋め込み（縦長サイズ）
                        const ytShortsRegex = /^[ \t]*https?:\/\/(?:www\.)?youtube\.com\/shorts\/([a-zA-Z0-9_-]+)[^\s<]*[ \t]*$/gm;
                        text = text.replace(ytShortsRegex, '\n\n<div style="max-width: 320px; margin: 1.5rem auto; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"><div style="position: relative; padding-bottom: 177.77%; height: 0;"><iframe src="https://www.youtube.com/embed/$1" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen></iframe></div></div>\n\n');

                        // ③ YouTube【通常動画】の自動埋め込み（横長サイズ）
                        const ytNormalRegex = /^[ \t]*https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)[^\s<]*[ \t]*$/gm;
                        text = text.replace(ytNormalRegex, '\n\n<div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; margin: 1.5rem 0; border-radius: 8px;"><iframe src="https://www.youtube.com/embed/$1" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen></iframe></div>\n\n');

                        // MarkdownをHTMLに変換
                        compiledMarkdown.value = marked.parse(text);

                        // VueがHTMLを描画したあとに、Xのカード化プログラムを起動
                        nextTick(() => {
                            setTimeout(() => {
                                if (window.twttr && window.twttr.widgets) {
                                    window.twttr.widgets.load();
                                }
                            }, 500);
                        });

                    } catch (error) {
                        console.error(error);
                        compiledMarkdown.value = `<p>記事の読み込みに失敗しました。</p>`;
                    }
                });

                return {
                    articleId,
                    compiledMarkdown,
                    imageErrors,
                    handleImageError,
                    hasGallery,
                    prevArticle,
                    nextArticle
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
