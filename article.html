<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>記事ページ | エリカ・プロジェクト</title>
    <link rel="stylesheet" href="/css/lib/bulma.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/lib/marked.min.js"></script>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</head>

<body>
    <div id="app" class="container section">
        <div class="content">

            <div v-html="compiledMarkdown"></div>

            <hr v-if="compiledMarkdown !== '<p>読み込み中...</p>'">

            <div class="columns is-multiline">
                <div class="column is-half" v-for="n in 10" :key="n" v-show="!imageErrors[n]">
                    <figure class="image">
                        <img :src="`/assets/images/gallery/${articleId}/${n}.png`" @error="handleImageError(n)"
                            alt="エリカ・ギャラリー画像">
                    </figure>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        // ローカルのVueを読み込む
        import { createApp, ref, onMounted, nextTick } from '/js/lib/vue.esm-browser.js';

        createApp({
            setup() {
                const articleId = ref('');
                const compiledMarkdown = ref('<p>読み込み中...</p>');
                const imageErrors = ref({}); // エラーになった（存在しない）画像番号を記録

                // 画像が存在しない場合は、その番号を記録して画面から隠す（v-showと連動）
                const handleImageError = (n) => {
                    imageErrors.value[n] = true;
                };

                onMounted(async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id') || '001-test';
                    articleId.value = id;

                    try {
                        const response = await fetch(`/articles/${id}.md`);
                        if (!response.ok) throw new Error('記事が見つかりません');
                        let text = await response.text();

                        // 🌟 修正ポイント1：Windows特有の改行コード(\r)を完全に削除（正規表現の空振りを防ぐ）
                        text = text.replace(/\r/g, '');

                        // 🌟 修正ポイント2：より強力でシンプルなURL検知（行の最初から最後までがXのURLなら変換）
                        const xLinkRegex = /^(https?:\/\/(?:x\.com|twitter\.com)\/[a-zA-Z0-9_]+\/status\/\d+.*)$/gm;
                        text = text.replace(xLinkRegex, '<blockquote class="twitter-tweet"><a href="$1">$1</a></blockquote>');

                        // MarkdownをHTMLに変換
                        compiledMarkdown.value = marked.parse(text);

                        // 🌟 修正ポイント3：描画後に確実にXのプログラムを起動する
                        nextTick(() => {
                            setTimeout(() => {
                                // すでにXの機能があれば実行、なければ強制読み込み
                                if (window.twttr && window.twttr.widgets) {
                                    window.twttr.widgets.load();
                                } else {
                                    const script = document.createElement('script');
                                    script.src = "https://platform.twitter.com/widgets.js";
                                    script.charset = "utf-8";
                                    script.async = true;
                                    document.body.appendChild(script);
                                }
                            }, 300); // 確実にHTMLが描画されるのを0.3秒だけ待つ
                        });

                    } catch (error) {
                        console.error(error);
                        compiledMarkdown.value = `<p>記事の読み込みに失敗しました。</p>`;
                    }
                });
                return { articleId, compiledMarkdown, imageErrors, handleImageError };
            }
        }).mount('#app');
    </script>
</body>

</html>
